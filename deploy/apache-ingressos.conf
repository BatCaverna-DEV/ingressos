# Configuração Apache para o sistema de ingressos
# Copiar para: /etc/apache2/sites-available/ingressos.conf
# Habilitar: a2ensite ingressos && a2enmod rewrite proxy proxy_http && systemctl reload apache2

<VirtualHost *:80>
    ServerName seu-dominio.com.br
    DocumentRoot /var/www/html

    # Proxy da API Node.js → /ingressos/api
    ProxyRequests Off
    ProxyPreserveHost On

    <Location /ingressos/api>
        ProxyPass        http://127.0.0.1:3000/api
        ProxyPassReverse http://127.0.0.1:3000/api
    </Location>

    # SPA Vue.js em /ingressos/
    <Directory /var/www/html/ingressos>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/ingressos-error.log
    CustomLog ${APACHE_LOG_DIR}/ingressos-access.log combined
</VirtualHost>
